name: meread
description: MeRead
publish_to: "none"

version: 0.6.1+23

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dart_rss: ^3.0.1
  dio: ^5.4.1
  drift: ^2.33.0
  dynamic_color: ^1.6.9
  file_picker: ^8.0.3
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_launcher_icons: ^0.14.3
  flutter_localizations:
    sdk: flutter
  flutter_swipe_action_cell: ^3.1.3
  flutter_widget_from_html: ^0.17.2
  fluttertoast: ^8.2.5
  get: ^4.6.6
  html: ^0.15.4
  html_main_element: ^2.1.0
  intl: ^0.20.2
  logger: ^2.0.2+1
  opml: ^0.4.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.1
  share_plus: ^10.0.0
  shared_preferences: ^2.2.2
  sqlite3_flutter_libs: ^0.6.0+eol
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  flutter_lints: ^4.0.0
  drift_dev: ^2.33.0

flutter:
  uses-material-design: true
  assets:
    - assets/meread.png

# 変更したら flutter pub run flutter_launcher_icons:main
# ./gradlew --refresh-dependencies 
flutter_icons:
  image_path: "assets/meread.png"
  remove_alpha_ios: true
  android: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/meread.png"
  adaptive_icon_foreground_inset: 26


dependency_overrides:
  intl: ^0.20.2
